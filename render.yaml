services:
  - type: web
    name: masterji-ai-tutor
    env: python
    buildCommand: ./build.sh
    startCommand: gunicorn student_dashboard.wsgi:application
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.2
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_ALLOWED_HOSTS
        value: 127.0.0.1,localhost
