<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
    <title>Student Dashboard</title>
</head>
<body>
    <div class="xp-bar">
        <h2>XP Bar</h2>
        <div class="xp-progress">
            <div class="xp-fill" style="width: 70%;"></div>
        </div>
    </div>
    <div class="dashboard-container">
        <div class="assignments-bar">
            <h3>Assignments</h3>
            <ul>
                <li>Assignment 1</li>
                <li>Assignment 2</li>
                <li>Assignment 3</li>
            </ul>
        </div>
        <div class="python-workspace">
            <h3>Python Workspace</h3>
            <textarea id="python-code" rows="20" cols="50" placeholder="Write your Python code here..."></textarea>
            <button id="run-code">Run Code</button>
            <pre id="output"></pre>
        </div>
    </div>
    <script src="{% static 'js/scripts.js' %}"></script>
</body>
</html>
